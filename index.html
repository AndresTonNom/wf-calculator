<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Fighters Calculator</title>
  <link rel="icon" type="image/png" href="https://i.imgur.com/DnWXAht.png">
  <link rel="apple-touch-icon" href="https://i.imgur.com/DnWXAht.png">
  <style>
    :root {
      --accent-orange: #ff6600;
      --bg-black: #0a0a0a;
      --input-bg: #111111;
      --text-gray: #888;
      --text-white: #ffffff;
      --card-bg: #080808;
      --border-color: #2a2a2a;
      --neon-glow: rgba(255,102,0,0.6);
      --grid-color: rgba(255,102,0,0.15);
    }

    body.theme-red {
      --accent-orange: #ff3b3b;
      --neon-glow: rgba(255,59,59,0.6);
      --grid-color: rgba(255,59,59,0.15);
    }
    body.theme-blue {
      --accent-orange: #00aaff;
      --neon-glow: rgba(0,170,255,0.6);
      --grid-color: rgba(0,170,255,0.15);
    }
    body.theme-green {
      --accent-orange: #00cc66;
      --neon-glow: rgba(0,204,102,0.6);
      --grid-color: rgba(0,204,102,0.15);
    }
    body.theme-purple {
      --accent-orange: #a349a4;
      --neon-glow: rgba(163,73,164,0.6);
      --grid-color: rgba(163,73,164,0.15);
    }

    body {
      margin: 0;
      padding-top: 60px;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #000000;
      color: var(--text-white);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: 50px 50px;
      transform: perspective(500px) rotateX(60deg) scale(2);
      transform-origin: center bottom;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        180deg,
        transparent 0%,
        var(--neon-glow) 48%,
        var(--neon-glow) 52%,
        transparent 100%
      );
      background-size: 100% 300%;
      animation: scanline 6s linear infinite;
      opacity: 0.08;
      pointer-events: none;
      z-index: 0;
    }

.power-effects {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

.energy-particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: var(--accent-orange);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--neon-glow);
      animation: floatUp 4s ease-in infinite;
    }

.energy-particle:nth-child(1) { left: 20%; animation-delay: 0s; }
.energy-particle:nth-child(2) { left: 50%; animation-delay: 1.3s; }
.energy-particle:nth-child(3) { left: 80%; animation-delay: 2.6s; }

    @keyframes scanline {
      0% { background-position: 0 -100%; }
      100% { background-position: 0 100%; }
    }

    @keyframes floatUp {
      0% { opacity: 0; transform: translateY(100vh); }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-100vh); }
    }

.cyber-glow {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 600px;
      height: 600px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, var(--neon-glow) 0%, transparent 70%);
      filter: blur(40px);
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }

.topbar {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(5,5,5,0.95);
      border-bottom: 1px solid var(--accent-orange);
      padding: 8px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 15px var(--neon-glow);
      z-index: 100;
    }

.top-title {
      font-size: 16px;
      font-weight: bold;
      color: var(--accent-orange);
      text-shadow: 0 0 10px var(--neon-glow);
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

.title-icon {
      display: inline-flex;
      align-items: center;
    }

.title-icon img {
      width: 28px;
      height: 28px;
      object-fit: cover;
      vertical-align: middle;
      border-radius: 50%;
      border: 1px solid var(--accent-orange);
      filter: drop-shadow(0 0 6px var(--neon-glow));
    }

.settings-btn {
      background: rgba(17,17,17,0.8);
      border: 1px solid var(--accent-orange);
      color: var(--accent-orange);
      width: 32px;
      height: 32px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 8px var(--neon-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

.settings-btn:hover {
      box-shadow: 0 0 15px var(--neon-glow);
      transform: rotate(90deg);
    }

.settings-menu {
      position: absolute;
      top: 50px;
      right: 15px;
      background: rgba(10,10,10,0.98);
      border: 2px solid var(--accent-orange);
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 0 20px var(--neon-glow);
      z-index: 200;
      min-width: 220px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: all 0.3s ease;
    }

.settings-menu.active {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

.settings-menu h3 {
      margin: 0 0 12px 0;
      font-size: 14px;
      color: var(--accent-orange);
      text-shadow: 0 0 10px var(--neon-glow);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

.theme-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      margin-bottom: 6px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

.theme-option:hover {
      background: rgba(255,255,255,0.05);
      border-color: var(--accent-orange);
    }

.theme-option.active {
      background: rgba(255,102,0,0.1);
      border-color: var(--accent-orange);
    }

.theme-color {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      box-shadow: 0 0 8px currentColor;
    }

.calculator-card {
      width: 850px;
      max-width: 95vw;
      background: rgba(10,10,10,0.95);
      border: 2px solid var(--accent-orange);
      border-radius: 8px;
      padding: 30px;
      box-shadow: 0 0 20px var(--neon-glow),
                  inset 0 0 20px rgba(0,0,0,0.5);
      position: relative;
      z-index: 1;
      margin: 20px 0;
    }

    h1 {
      color: var(--accent-orange);
      font-size: 22px;
      text-align: center;
      margin-bottom: 10px;
      text-shadow: 0 0 15px var(--neon-glow);
      letter-spacing: 2px;
    }

    hr {
      border: 0;
      border-top: 1px solid var(--accent-orange);
      margin-bottom: 25px;
      box-shadow: 0 0 8px var(--neon-glow);
    }

.input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

.field { display: flex; flex-direction: column; gap: 8px; }
.row { display: flex; gap: 10px; }

    label {
      font-size: 11px;
      font-weight: bold;
      color: #ffffff;
      text-transform: uppercase;
      text-shadow: 0 0 8px var(--neon-glow);
      display: flex;
      align-items: center;
      gap: 8px;
    }

.label-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      min-width: 24px;
    }

.label-icon img {
      width: 24px;
      height: 24px;
      object-fit: contain;
      filter: drop-shadow(0 0 6px var(--neon-glow));
    }

.label-icon span {
      color: var(--accent-orange);
      font-size: 20px;
      line-height: 24px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 0 6px var(--neon-glow));
    }

    input, select {
      background: rgba(17,17,17,0.9);
      border: 1px solid var(--border-color);
      color: var(--text-gray);
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
      width: 100%;
      box-sizing: border-box;
    }

    input::placeholder {
      color: #555;
      opacity: 1;
    }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] {
      -moz-appearance: textfield;
    }

    input:focus, select:focus {
      border-color: var(--accent-orange);
      color: white;
      box-shadow: 0 0 10px var(--neon-glow);
      outline: none;
    }

.suffix-box { width: 90px; flex-shrink: 0; }

.results-horizontal {
      display: flex;
      gap: 15px;
      margin-top: 20px;
    }

.res-card {
      flex: 1;
      background: rgba(8,8,8,0.9);
      border: 1px solid var(--accent-orange);
      padding: 15px 10px;
      text-align: center;
      border-radius: 8px;
      box-shadow: 0 0 8px var(--neon-glow);
    }

.res-card:hover {
      box-shadow: 0 0 15px var(--neon-glow);
    }

.res-label {
      font-size: 10px;
      color: #ffffff;
      text-transform: uppercase;
      margin-bottom: 5px;
      text-shadow: 0 0 8px var(--neon-glow);
    }

.res-value {
      font-size: 18px;
      font-weight: bold;
      color: var(--accent-orange);
      text-shadow: 0 0 10px var(--neon-glow);
    }

.projection-card {
      margin-top: 20px;
      padding: 20px;
      background: rgba(17,17,17,0.9);
      border-radius: 8px;
      border: 1px solid var(--accent-orange);
      box-shadow: 0 0 10px var(--neon-glow);
    }

.projection-card label {
      display: block;
      text-align: center;
      color: var(--accent-orange);
      font-size: 14px;
      font-weight: bold;
      text-shadow: 0 0 10px var(--neon-glow);
    }

.projection-inputs {
      display: flex;
      gap: 10px;
      margin: 15px 0;
      justify-content: center;
      align-items: center;
    }

.projection-inputs input {
      max-width: 120px;
      text-align: center;
    }

.projection-inputs select {
      max-width: 150px;
    }

.projection-results {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      text-align: center;
    }

.projection-label {
      font-size: 12px;
      color: #ffffff;
      opacity: 0.9;
      text-shadow: 0 0 8px var(--neon-glow);
    }

.projection-value {
      font-size: 22px;
      color: var(--accent-orange);
      text-shadow: 0 0 10px var(--neon-glow);
      font-weight: bold;
    }

    @media (max-width: 768px) {
      body::after { animation: none; }
.energy-particle { display: none; }
.cyber-glow { display: none; }
.calculator-card {
        width: 95vw;
        padding: 20px;
        margin: 10px;
        box-shadow: 0 0 10px var(--neon-glow);
      }
.input-grid { grid-template-columns: 1fr; }
.results-horizontal { flex-direction: column; }
.projection-inputs { flex-direction: column; }
.projection-inputs input,.projection-inputs select { max-width: 100%; }
    }
  </style>
</head>

<body>
  <div class="cyber-glow"></div>
  <div class="power-effects">
    <div class="energy-particle"></div>
    <div class="energy-particle"></div>
    <div class="energy-particle"></div>
  </div>

  <div class="topbar">
    <div class="top-title">
      <span class="title-icon" id="titleIcon">
        <img src="https://i.imgur.com/DnWXAht.png" alt="WF Icon">
      </span>
      <span>World Fighters Calculator</span>
    </div>
    <button class="settings-btn" id="settingsBtn">⚙️</button>

    <div class="settings-menu" id="settingsMenu">
      <h3>🎨 Neon Theme</h3>
      <div class="theme-option active" data-theme="default">
        <div class="theme-color" style="background: #ff6600;"></div>
        <span>Orange Neon</span>
      </div>
      <div class="theme-option" data-theme="theme-red">
        <div class="theme-color" style="background: #ff3b3b;"></div>
        <span>Red Neon</span>
      </div>
      <div class="theme-option" data-theme="theme-blue">
        <div class="theme-color" style="background: #00aaff;"></div>
        <span>Blue Neon</span>
      </div>
      <div class="theme-option" data-theme="theme-green">
        <div class="theme-color" style="background: #00cc66;"></div>
        <span>Green Neon</span>
      </div>
      <div class="theme-option" data-theme="theme-purple">
        <div class="theme-color" style="background: #a349a4;"></div>
        <span>Purple Neon</span>
      </div>
    </div>
  </div>

  <div class="calculator-card">
    <h1>Awakening Calculator</h1>
    <hr>

    <div class="input-grid">
      <div class="field">
        <label>
          <span class="label-icon">
            <img src="https://i.imgur.com/bs1cZaI.png" alt="Target Icon">
          </span>
          <span>TARGET AWAKENING</span>
        </label>
        <select id="targetRank"></select>

        <label>
          <span class="label-icon">
            <img src="https://i.imgur.com/y78MxOv.png" alt="Power Icon">
          </span>
          <span>Current Power</span>
        </label>
        <div class="row">
          <input type="number" id="curPower" placeholder="e.g., 5000">
          <select id="curSuf" class="suffix-box"></select>
        </div>
      </div>

      <div class="field">
        <label>
          <span class="label-icon">
            <img src="https://i.imgur.com/y78MxOv.png" alt="Click Icon">
          </span>
          <span>Power per Click</span>
        </label>
        <div class="row">
          <input type="number" id="cliPower" placeholder="e.g., 150">
          <select id="cliSuf" class="suffix-box"></select>
        </div>

        <label>
          <span class="label-icon">
            <span>⏱️</span>
          </span>
          <span>Click Cooldown</span>
        </label>
        <input type="number" id="cooldown" step="0.01" placeholder="e.g., 0.15">
      </div>
    </div>

    <div class="results-horizontal">
      <div class="res-card">
        <div class="res-label">POWER NEEDED</div>
        <div id="outNeed" class="res-value">---</div>
      </div>
      <div class="res-card">
        <div class="res-label">NEW MULTIPLIER</div>
        <div id="outMult" class="res-value">---</div>
      </div>
      <div class="res-card">
        <div class="res-label">TIME TO RANK UP</div>
        <div id="outTime" class="res-value">---</div>
      </div>
    </div>

    <div class="projection-card">
      <label>POWER PROJECTION (NO AWAKENING)</label>
      <div class="projection-inputs">
        <input type="number" id="projTime" placeholder="60">
        <select id="projUnit">
          <option value="60">Minutes</option>
          <option value="3600">Hours</option>
        </select>
      </div>

      <div class="projection-results">
        <div>
          <div class="projection-label">Power to Earn:</div>
          <div id="projectedGain" class="projection-value">+0</div>
        </div>
        <div>
          <div class="projection-label">Total Power:</div>
          <div id="projectedTotal" class="projection-value">0</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUFFIXES = ["", "K", "M", "B", "T", "Qd", "Qn", "Sx", "Sp", "Oc", "No", "De"];

    const AWAKENINGS = [
      { name: "Awakening 2", req: 5e3, mult: 1.5 },
      { name: "Awakening 3", req: 45e3, mult: 2 },
      { name: "Awakening 4", req: 250e3, mult: 4 },
      { name: "Awakening 5", req: 1e6, mult: 8 },
      { name: "Awakening 6", req: 5.5e6, mult: 16 },
      { name: "Awakening 7", req: 27.5e6, mult: 32 },
      { name: "Awakening 8", req: 105e6, mult: 64 },
      { name: "Awakening 9", req: 750e6, mult: 128 },
      { name: "Awakening 10", req: 3.5e9, mult: 256 },
      { name: "Awakening 11", req: 25e9, mult: 512 },
      { name: "Awakening 12", req: 85e9, mult: 1024 },
      { name: "Awakening 13", req: 350e9, mult: 2048 },
      { name: "Awakening 14", req: 750e9, mult: 4096 },
      { name: "Awakening 15", req: 3e12, mult: 8192 },
      { name: "Awakening 16", req: 25e12, mult: 16400 },
      { name: "Awakening 17", req: 210e12, mult: 32800 },
      { name: "Awakening 18", req: 1.5e15, mult: 65500 },
      { name: "Awakening 19", req: 12.5e15, mult: 131000 },
      { name: "Awakening 20", req: 105e15, mult: 262000 },
      { name: "Awakening 21", req: 925e15, mult: 524000 },
      { name: "Awakening 22", req: 35e18, mult: 1050000 },
      { name: "Awakening 23", req: 2.5e21, mult: 2100000 },
      { name: "Awakening 24", req: 225e21, mult: 4190000 },
      { name: "Awakening 25", req: 21e24, mult: 8390000 },
      { name: "Awakening 26", req: 265e24, mult: 16800000 },
      { name: "Awakening 27", req: 3.99e27, mult: 33600000 },
      { name: "Awakening 28", req: 105e27, mult: 67200000 },
      { name: "Awakening 29", req: 2.85e30, mult: 134000000 }
    ];

    const elements = {
      targetRank: document.getElementById('targetRank'),
      curPower: document.getElementById('curPower'),
      curSuf: document.getElementById('curSuf'),
      cliPower: document.getElementById('cliPower'),
      cliSuf: document.getElementById('cliSuf'),
      cooldown: document.getElementById('cooldown'),
      projTime: document.getElementById('projTime'),
      projUnit: document.getElementById('projUnit'),
      outNeed: document.getElementById('outNeed'),
      outMult: document.getElementById('outMult'),
      outTime: document.getElementById('outTime'),
      projectedGain: document.getElementById('projectedGain'),
      projectedTotal: document.getElementById('projectedTotal')
    };

    const settingsBtn = document.getElementById('settingsBtn');
    const settingsMenu = document.getElementById('settingsMenu');
    const themeOptions = document.querySelectorAll('.theme-option');

    settingsBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      settingsMenu.classList.toggle('active');
    });

    document.addEventListener('click', (e) => {
      if (!settingsMenu.contains(e.target) &&!settingsBtn.contains(e.target)) {
        settingsMenu.classList.remove('active');
      }
    });

    themeOptions.forEach(option => {
      option.addEventListener('click', () => {
        const theme = option.dataset.theme;
        document.body.className = theme === 'default'? '' : theme;

        themeOptions.forEach(opt => opt.classList.remove('active'));
        option.classList.add('active');
        settingsMenu.classList.remove('active');
      });
    });

    AWAKENINGS.forEach((aw, i) => elements.targetRank.add(new Option(aw.name, i)));
    SUFFIXES.forEach(sf => {
      elements.curSuf.add(new Option(sf || "none", sf));
      elements.cliSuf.add(new Option(sf || "none", sf));
    });

    function format(n) {
      if (n === 0) return "0";
      if (n < 1000) return Math.floor(n).toString();
      const i = Math.floor(Math.log10(n) / 3);
      if (i >= SUFFIXES.length) return n.toExponential(2);
      const val = n / Math.pow(10, i * 3);
      return (val % 1 === 0? val.toFixed(0) : val.toFixed(2).replace(/\.?0+$/, '')) + SUFFIXES[i];
    }

    function formatMult(n) {
      if (n < 1000) return n.toString();
      if (n < 1000000) return (n/1000).toFixed(1) + 'K';
      return (n/1000000).toFixed(2) + 'M';
    }

    function formatTime(s) {
      if (s < 60) return s.toFixed(1) + "s";
      if (s < 3600) return Math.floor(s / 60) + "m " + Math.floor(s % 60) + "s";
      if (s < 86400) return Math.floor(s / 3600) + "h " + Math.floor(s % 3600 / 60) + "m";
      return Math.floor(s / 86400) + "d " + Math.floor(s % 86400 / 3600) + "h";
    }

    function calculate() {
      const idx = parseInt(elements.targetRank.value) || 0;
      const aw = AWAKENINGS[idx];

      elements.outMult.textContent = "x" + formatMult(aw.mult);

      const curVal = +elements.curPower.value || 0;
      const curSufIdx = SUFFIXES.indexOf(elements.curSuf.value);
      const cur = curVal * Math.pow(10, curSufIdx * 3);

      const needed = Math.max(0, aw.req - cur);
      elements.outNeed.textContent = format(needed);

      const cliVal = +elements.cliPower.value || 0;
      const cliSufIdx = SUFFIXES.indexOf(elements.cliSuf.value);
      const cli = cliVal * Math.pow(10, cliSufIdx * 3);
      const cd = +elements.cooldown.value || 0;
      const pTime = +elements.projTime.value || 60;
      const pUnit = +elements.projUnit.value;

      if (cli > 0 && cd > 0 && pTime > 0) {
        const gain = (pTime * pUnit / cd) * cli;
        elements.projectedGain.textContent = "+" + format(gain);
        elements.projectedTotal.textContent = format(cur + gain);
      } else {
        elements.projectedGain.textContent = "+0";
        elements.projectedTotal.textContent = format(cur);
      }

      if (cli <= 0) {
        elements.outTime.textContent = "---";
        return;
      }

      if (cd <= 0) {
        elements.outTime.textContent = "Click cooldown required";
        return;
      }

      const clicks = needed / cli;
      const seconds = clicks * cd;
      elements.outTime.textContent = needed <= 0? "¡Listo!" : formatTime(seconds);
    }

    let calcTimeout;
    ['input', 'change'].forEach(evt => {
      document.querySelectorAll('input, select').forEach(el => {
        el.addEventListener(evt, () => {
          clearTimeout(calcTimeout);
          calcTimeout = setTimeout(() => {
            requestAnimationFrame(calculate);
          }, 300);
        });
      });
    });

    elements.targetRank.value = "0";
    elements.cliSuf.value = "";
    elements.curSuf.value = "";
    calculate();
  </script>
</body>
</html>
